# Loan Underwriting Service Configurations
app:
  name: "Loan Approval Risk Service"
  env: "production"
  version: "1.0.0"

model:
  path: "app/model.pkl"
  default_threshold: 0.50
  features:
    - age
    - annual_income
    - credit_score
    - loan_amount
    - loan_duration
    - savings_balance
    - total_assets
    - total_liabilities
    - previous_defaults
    - cc_utilization

logging:
  level: "INFO"
  format: "json"
